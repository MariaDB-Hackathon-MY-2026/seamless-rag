<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 20" width="180" height="20">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="100%" stop-color="#444"/>
    </linearGradient>
    <linearGradient id="val" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#003545"/>
      <stop offset="100%" stop-color="#00465C"/>
    </linearGradient>
  </defs>
  <!-- Left side -->
  <rect width="82" height="20" rx="3" fill="url(#bg)"/>
  <!-- Right side -->
  <rect x="82" width="98" height="20" rx="3" fill="url(#val)"/>
  <!-- Cover middle join -->
  <rect x="79" width="6" height="20" fill="url(#bg)"/>
  <rect x="82" width="3" height="20" fill="url(#val)"/>
  <!-- Text -->
  <text x="41" y="14" text-anchor="middle" font-family="Verdana, Geneva, DejaVu Sans, sans-serif" font-size="11" fill="#FFFFFF">powered by</text>
  <text x="131" y="14" text-anchor="middle" font-family="Verdana, Geneva, DejaVu Sans, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">MariaDB 11.8</text>
</svg>
