services:
  db:
    image: mariadb:11.8
    environment:
      MARIADB_ROOT_PASSWORD: seamless
      MARIADB_DATABASE: seamless_rag
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 5s
      retries: 10

volumes:
  mariadb_data:
