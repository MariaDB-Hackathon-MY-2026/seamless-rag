name: Release

# Triggered by pushing a version tag — e.g. `git tag v0.1.4 && git push origin v0.1.4`.
# The tag is the single trigger and the version is read from pyproject.toml at
# build time (which is the single source of truth for the version number).
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # create the GitHub Release

jobs:
  verify:
    name: Verify tag matches pyproject.toml
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        # Refuse to publish if `git tag v0.1.4` was pushed but pyproject.toml still
        # says version = "0.1.3". Catches the most common release-mistake class.
        run: |
          set -euo pipefail
          tag="${GITHUB_REF##*/v}"
          pyproj=$(grep -E '^version = "' pyproject.toml | head -1 | sed -E 's/version = "([^"]+)"/\1/')
          echo "tag=$tag pyproject=$pyproj"
          if [ "$tag" != "$pyproj" ]; then
            echo "::error::Tag v$tag does not match pyproject.toml version $pyproj. Bump pyproject.toml first, commit, then re-tag."
            exit 1
          fi
          echo "version=$tag" >> "$GITHUB_OUTPUT"

  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --upgrade build twine
      - run: python -m build
      - run: twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi:
    name: Upload to PyPI
    runs-on: ubuntu-latest
    needs: build
    # Once the PyPI Trusted Publisher is configured (recommended) this becomes
    # token-less. Until then, the PYPI_API_TOKEN secret is used. To migrate:
    #   1. https://pypi.org/manage/project/seamless-rag/settings/publishing/
    #   2. Add publisher with owner=MariaDB-Hackathon-MY-2026, repo=seamless-rag,
    #      workflow=release.yml, environment=(empty)
    #   3. Replace the `password:` line below with `# OIDC` and uncomment the
    #      `permissions: id-token: write` line at the job level.
    # permissions:
    #   id-token: write   # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: false   # version reuse is a hard error, by design

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [verify, pypi]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Extract changelog section for this version
        id: notes
        run: |
          set -euo pipefail
          version="${{ needs.verify.outputs.version }}"
          if [ -f CHANGELOG.md ]; then
            # Section between "## [<version>]" and the next "## [" header.
            # Use literal string match (not regex) — the brackets in
            # "[0.1.5]" would otherwise be interpreted as a character class.
            awk -v target="## [$version]" '
              index($0, target) == 1 { capture=1; next }
              capture && /^## \[/ { exit }
              capture { print }
            ' CHANGELOG.md > release_notes.md
          fi
          if [ ! -s release_notes.md ]; then
            echo "Release $version. See CHANGELOG.md for details." > release_notes.md
          fi
      - uses: softprops/action-gh-release@v2
        with:
          name: v${{ needs.verify.outputs.version }}
          body_path: release_notes.md
          files: dist/*
          fail_on_unmatched_files: true
