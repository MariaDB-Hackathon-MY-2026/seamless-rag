name: Deploy Docs

on:
  push:
    branches: [main]

# Push the built site directly to the gh-pages branch.
# Avoids the `github-pages` deployment environment, which is org-protected
# in MariaDB-Hackathon-MY-2026 and blocks deploys from main.
# GitHub's built-in pages-build-deployment workflow then publishes
# gh-pages → https://mariadb-hackathon-my-2026.github.io/seamless-rag/
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install mkdocs-material
      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Build and deploy to gh-pages
        run: mkdocs gh-deploy --force --no-history
