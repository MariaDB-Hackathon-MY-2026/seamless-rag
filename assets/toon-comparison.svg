<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <filter id="cardShadow">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="200" rx="8" fill="#F8F9FA"/>

  <!-- Title -->
  <text x="300" y="24" text-anchor="middle" font-family="system-ui, -apple-system, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#003545">Token Efficiency: JSON vs TOON</text>

  <!-- Left card: JSON -->
  <g filter="url(#cardShadow)">
    <rect x="20" y="40" width="240" height="140" rx="6" fill="#FFF5F5" stroke="#E8A87C" stroke-width="1"/>
    <text x="140" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#B85C38">JSON</text>
    <rect x="35" y="72" width="210" height="60" rx="4" fill="#FFFFFF" stroke="#EEE" stroke-width="0.5"/>
    <text x="42" y="87" font-family="monospace" font-size="7.5" fill="#666">[{"id": 1, "name": "Alice",</text>
    <text x="42" y="99" font-family="monospace" font-size="7.5" fill="#666">  "role": "engineer"},</text>
    <text x="42" y="111" font-family="monospace" font-size="7.5" fill="#666"> {"id": 2, "name": "Bob",</text>
    <text x="42" y="123" font-family="monospace" font-size="7.5" fill="#666">  "role": "designer"}]</text>
    <!-- Token count -->
    <rect x="80" y="142" width="120" height="28" rx="14" fill="#B85C38"/>
    <text x="140" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF">56 tokens</text>
  </g>

  <!-- Right card: TOON -->
  <g filter="url(#cardShadow)">
    <rect x="340" y="40" width="240" height="140" rx="6" fill="#F0FFF0" stroke="#5B9A5B" stroke-width="1"/>
    <text x="460" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#2D6A2D">TOON v3</text>
    <rect x="355" y="72" width="210" height="60" rx="4" fill="#FFFFFF" stroke="#EEE" stroke-width="0.5"/>
    <text x="362" y="89" font-family="monospace" font-size="8" fill="#666">[2,]{id,name,role}:</text>
    <text x="362" y="104" font-family="monospace" font-size="8" fill="#666">  1,Alice,engineer</text>
    <text x="362" y="119" font-family="monospace" font-size="8" fill="#666">  2,Bob,designer</text>
    <!-- Token count -->
    <rect x="400" y="142" width="120" height="28" rx="14" fill="#2D6A2D"/>
    <text x="460" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF">24 tokens</text>
  </g>

  <!-- Center arrow -->
  <g transform="translate(270, 90)">
    <polygon points="0,18 50,0 50,12 60,12 60,24 50,24 50,36" fill="#003545" opacity="0.8"/>
    <text x="30" y="58" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#003545">58%</text>
    <text x="30" y="72" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#666">fewer tokens</text>
  </g>
</svg>
